#local: routes to seperate container
#How the routing works
#Nginx is the single entry point on port 8080. Any request starting with /api/ is forwarded to the PHP-FPM container via
#FastCGI on port 9000. Everything else is reverse-proxied to Angular's dev server on port 4200. The /ng-cli-ws block
#keeps the Angular hot-reload WebSocket connection alive through the proxy.
server {
    listen 80;

    location /api/ {
        root /var/www;
        try_files $uri =404;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location / {
        proxy_pass http://frontend:4200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_cache_bypass $http_upgrade;
    }

    location /ng-cli-ws {
        proxy_pass http://frontend:4200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
    }
}